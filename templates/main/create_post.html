{% extends 'main/base.html' %}
{% block title %}Создать пост{% endblock %}
{% block content %}
<style>
.create-post-container {
    max-width: 800px;
    margin: 0 auto;
}

.create-post-form {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 30px;
    box-shadow: var(--shadow);
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--text-color);
    font-size: 16px;
}

.form-group input[type="text"],
.form-group textarea {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid var(--border-color);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-color);
    font-size: 16px;
    font-family: inherit;
    transition: all 0.3s;
}

.form-group input[type="text"]:focus,
.form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-glow);
}

.form-group textarea {
    min-height: 150px;
    resize: vertical;
}

/* Прикрепление фото */
.attach-section {
    margin-bottom: 20px;
}

.attach-label {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: var(--bg-color);
    border: 2px dashed var(--border-color);
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    color: var(--text-color);
    transition: all 0.3s;
}

.attach-label:hover {
    background: var(--primary-glow);
    border-color: var(--primary);
    color: var(--primary);
}

.attach-label input[type="file"] {
    display: none;
}

/* Предпросмотр фото */
.image-preview-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.preview-item {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 1;
}

.preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.remove-image {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(255, 59, 48, 0.95);
    color: white;
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.remove-image:hover {
    background: #ff3b30;
    transform: scale(1.1);
}

.btn-submit {
    background: var(--primary);
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 12px var(--primary-glow);
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px var(--primary-glow);
}

.btn-submit:active {
    transform: translateY(0);
}
</style>

<div class="create-post-container">
    <h1 style="margin-bottom: 20px; color: var(--text-color);">📝 Создать пост</h1>
    
    <form method="post" enctype="multipart/form-data" class="create-post-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="title">Заголовок:</label>
            <input type="text" id="title" name="title" placeholder="Введите заголовок поста" required>
        </div>
        
        <div class="form-group">
            <label for="content">Текст поста:</label>
            <textarea id="content" name="content" placeholder="О чём думаешь?" required></textarea>
        </div>
        
        <div class="attach-section">
            <label class="attach-label">
                📎 Прикрепить фото
                <input type="file" id="image-input" name="images" multiple accept="image/*" onchange="previewImages(this)">
            </label>
        </div>
        
        <div id="image-preview" class="image-preview-container"></div>
        
        <button type="submit" class="btn-submit">Опубликовать</button>
    </form>
</div>

<script>
function previewImages(input) {
    const preview = document.getElementById('image-preview');
    preview.innerHTML = '';
    
    if (input.files) {
        Array.from(input.files).forEach((file, index) => {
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-image';
                    removeBtn.innerHTML = '×';
                    removeBtn.type = 'button';
                    removeBtn.onclick = function() {
                        removeFile(input, index);
                        div.remove();
                    };
                    
                    div.appendChild(img);
                    div.appendChild(removeBtn);
                    preview.appendChild(div);
                };
                reader.readAsDataURL(file);
            }
        });
    }
}

function removeFile(input, index) {
    const dt = new DataTransfer();
    const files = input.files;
    
    for (let i = 0; i < files.length; i++) {
        if (i !== index) {
            dt.items.add(files[i]);
        }
    }
    
    input.files = dt.files;
}
</script>
{% endblock %}
