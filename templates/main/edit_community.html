{% extends 'main/base.html' %}
{% block title %}Редактировать сообщество{% endblock %}
{% block content %}
    <div class="container">
        <div class="page-hero">
            <h1 class="page-title">✏️ Редактировать сообщество</h1>
        </div>

        <div class="panel-card">
            <form method="post" enctype="multipart/form-data" style="max-width: 600px;">
                {% csrf_token %}
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 6px; font-weight: 600;">Название</label>
                    <input type="text" name="name" value="{{ group.name }}" class="form-control" required>
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 6px; font-weight: 600;">Описание</label>
                    <textarea name="description" class="form-control" rows="4">{{ group.description }}</textarea>
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 6px; font-weight: 600;">Аватар</label>
                    <input type="file" name="avatar" accept="image/*">
                    {% if group.avatar %}
                        <img src="{{ group.avatar.url }}" style="width: 80px; height: 80px; border-radius: 50%; margin-top: 8px;">
                    {% endif %}
                </div>
                <button type="submit" class="btn" style="width: 100%;">Сохранить изменения</button>
            </form>
            <p style="text-align: center; margin-top: 1rem;">
                <a href="{% url 'community_detail' group.id %}">← Отмена</a>
            </p>
        </div>
    </div>
{% endblock %}
